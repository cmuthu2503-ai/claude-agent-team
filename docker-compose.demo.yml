# Demo Environment
# Ports: backend=8030, frontend=3030
# Network: demo-net

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prod
    container_name: agent-team-demo-backend
    ports:
      - "8030:8000"
    volumes:
      - agent-team-demo-data:/app/data
      - ./demo:/app/demo
    env_file:
      - .env.demo
    environment:
      - ENVIRONMENT=demo
      - LOG_LEVEL=INFO
      - SEED_ON_STARTUP=true
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
    container_name: agent-team-demo-frontend
    ports:
      - "3030:3000"
    networks:
      - demo-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  agent-team-demo-data:

networks:
  demo-net:
    name: agent-team-demo
