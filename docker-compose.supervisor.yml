# Standalone Supervisor — runs independently from the main app stack.
# This container survives when the main app is rebuilt/restarted.
#
# Start:  docker compose -f docker-compose.supervisor.yml up -d --build
# Logs:   docker compose -f docker-compose.supervisor.yml logs -f
# Stop:   docker compose -f docker-compose.supervisor.yml down

name: agent-team-supervisor

services:
  supervisor:
    # Explicit image name so the supervisor can be pushed to / pulled from Docker
    # Hub under the same namespace as the main app images (cmuthu2503/agent-team-*).
    # `image:` + `build:` together mean: `compose build` tags as this name, and
    # `compose pull` fetches it from Docker Hub once published.
    image: cmuthu2503/agent-team-supervisor:latest
    build:
      context: .
      dockerfile: Dockerfile.supervisor
    container_name: agent-team-supervisor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-team-data:/app/data
      - .:/app/project
    working_dir: /app/project
    restart: unless-stopped

# Use the SAME named volume as the main app so supervisor can read the DB
volumes:
  agent-team-data:
    external: true
    name: claude-agent-team_agent-team-data
