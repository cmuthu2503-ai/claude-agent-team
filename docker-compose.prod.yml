# Production Environment
# Ports: backend=8020, frontend=3020
# Network: prod-net
#
# Image naming: this file produces images under cmuthu2503/* so they can be
# pushed to Docker Hub without colliding with the dev compose file (which auto-
# generates claude-agent-team-{backend,frontend}:latest). Both `image:` and
# `build:` are present so:
#   - `docker compose -f docker-compose.prod.yml build` builds locally and tags as cmuthu2503/...
#   - `docker compose -f docker-compose.prod.yml pull`  pulls from Docker Hub
#   - `docker compose -f docker-compose.prod.yml up`    uses the named image (build on miss)
#
# Required files BEFORE building (all 7 secrets — see ./secrets/README.md):
#   ./secrets/anthropic_api_key.txt
#   ./secrets/openai_api_key.txt
#   ./secrets/aws_access_key_id.txt
#   ./secrets/aws_secret_access_key.txt
#   ./secrets/github_token.txt
#   ./secrets/firecrawl_api_key.txt
#   ./secrets/jwt_secret.txt

services:
  backend:
    image: cmuthu2503/agent-team-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prod
    container_name: agent-team-prod-backend
    ports:
      - "8020:8000"
    volumes:
      - agent-team-prod-data:/app/data
      - agent-team-prod-reports:/app/reports
      - agent-team-prod-backups:/app/backups
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      # ── Required for remote deploy: tell the backend which origins to accept ──
      # Override per-deployment with the actual frontend hostname(s).
      # Comma-separated, no spaces.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3020}
      # ── Non-secret config (safe to bake in) ─────────────────────────────────
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-20250514-v1:0}
      - GITHUB_REPO=${GITHUB_REPO:-cmuthu2503-ai/claude-agent-team}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - OPENAI_GPT5_MODEL_ID=${OPENAI_GPT5_MODEL_ID:-gpt-5.4}
      - OPENAI_O3_MODEL_ID=${OPENAI_O3_MODEL_ID:-o4-mini}
      - ANTHROPIC_OPUS_MODEL_ID=${ANTHROPIC_OPUS_MODEL_ID:-claude-opus-4-6}
      - ANTHROPIC_SONNET_MODEL_ID=${ANTHROPIC_SONNET_MODEL_ID:-claude-sonnet-4-6}
    secrets:
      - anthropic_api_key
      - openai_api_key
      - aws_access_key_id
      - aws_secret_access_key
      - github_token
      - firecrawl_api_key
      - jwt_secret
    networks:
      - prod-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    image: cmuthu2503/agent-team-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
    container_name: agent-team-prod-frontend
    ports:
      - "3020:3000"
    networks:
      - prod-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  agent-team-prod-data:
  agent-team-prod-reports:
  agent-team-prod-backups:

networks:
  prod-net:
    name: agent-team-prod

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  aws_access_key_id:
    file: ./secrets/aws_access_key_id.txt
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key.txt
  github_token:
    file: ./secrets/github_token.txt
  firecrawl_api_key:
    file: ./secrets/firecrawl_api_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
